// Compose stability configuration (PERF4-1). These types are effectively immutable in this app:
// android.util.Size/Range are value holders, Uri is immutable, and CameraCaps is a read-only
// capability snapshot built once per camera route. Marking them stable lets strong skipping
// actually skip children whose slices did not change instead of recomposing the whole tree on
// every telemetry tick.
android.util.Size
android.util.Range
android.net.Uri
com.hletrd.findx9tele.camera.CameraCaps
